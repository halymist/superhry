<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>superhry · arena</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div class="game-root">
    <canvas id="game-canvas"></canvas>

    <div class="hud">
      <div id="respawn-indicator" class="respawn-indicator" hidden>Respawn in 10s</div>

      <div class="hp-center-panel">
        <div id="buff-w-indicator" class="buff-indicator" hidden>Sprint</div>
        <div id="r-cast-wrap" class="cast-bar-wrap" hidden>
          <div class="cast-bar-track">
            <div id="r-cast-fill" class="cast-bar-fill"></div>
          </div>
        </div>
        <div class="hp-bar">
          <div id="hp-fill" class="hp-fill"></div>
          <div id="hp-text" class="bar-value">100/100</div>
        </div>
        <div class="mp-bar">
          <div id="mp-fill" class="mp-fill"></div>
          <div id="mp-text" class="bar-value">100/100</div>
        </div>
      </div>

      <div class="ability-bar" id="ability-bar">
        <div class="ability-slot" id="slot-q" data-slot="q">
          <div class="key">Q</div>
          <div class="label">Prázdné</div>
          <div class="cd-mask" id="slot-q-mask"></div>
        </div>
        <div class="ability-slot" id="slot-w" data-slot="w">
          <div class="key">W</div>
          <div class="label">Prázdné</div>
          <div class="cd-mask" id="slot-w-mask"></div>
        </div>
        <div class="ability-slot" id="slot-e" data-slot="e">
          <div class="key">E</div>
          <div class="label">Prázdné</div>
          <div class="cd-mask" id="slot-e-mask"></div>
        </div>
        <div class="ability-slot" id="slot-r" data-slot="r">
          <div class="key">R</div>
          <div class="label">Prázdné</div>
          <div class="cd-mask" id="slot-r-mask"></div>
        </div>
      </div>

      <div class="gold-floating">Prémie: <span id="gold-text">0</span></div>
      <button id="spellbook-toggle" class="spellbook-toggle">Kouzla</button>

      <div class="spellbook-panel" id="spellbook-panel" hidden>
        <div class="sb-head">
          <div class="sb-meta">Vylepšení (3 Prémie)</div>
          <button id="spellbook-close" class="sb-close" type="button" aria-label="Zavřít panel">&times;</button>
        </div>

        <div class="sb-grid">
          <button class="sb-spell sb-upgrade sb-up-hp" data-upgrade="hp" type="button">
            <div class="sb-spell-top"><span class="sb-name">HP</span></div>
            <div class="sb-lvl" id="u-hp">0/10</div>
          </button>
          <button class="sb-spell sb-upgrade sb-up-mana" data-upgrade="mana" type="button">
            <div class="sb-spell-top"><span class="sb-name">Mana</span></div>
            <div class="sb-lvl" id="u-mana">0/10</div>
          </button>
          <div class="sb-spell" data-spell="q" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Salva</span></div>
            <div class="sb-lvl" id="u-q">0/5</div>
          </div>
          <div class="sb-spell" data-spell="w" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Sprint</span></div>
            <div class="sb-lvl" id="u-w">0/5</div>
          </div>
          <div class="sb-spell" data-spell="e" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Teleport</span></div>
            <div class="sb-lvl" id="u-e">0/5</div>
          </div>
          <div class="sb-spell" data-spell="r" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Strela</span></div>
            <div class="sb-lvl" id="u-r">0/5</div>
          </div>
          <div class="sb-spell" data-spell="c" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Naraz</span></div>
            <div class="sb-lvl" id="u-c">0/5</div>
          </div>
          <div class="sb-spell" data-spell="v" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Pole</span></div>
            <div class="sb-lvl" id="u-v">0/5</div>
          </div>
          <div class="sb-spell" data-spell="x" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Omraceni</span></div>
            <div class="sb-lvl" id="u-x">0/5</div>
          </div>
          <div class="sb-spell" data-spell="z" draggable="true">
            <div class="sb-spell-top"><span class="sb-name">Dopad</span></div>
            <div class="sb-lvl" id="u-z">0/5</div>
          </div>
        </div>
      </div>
    </div>

    <div id="name-modal" class="name-modal">
      <div class="box">
        <div><b>Zadej jméno</b></div>
        <input id="name-input" maxlength="16" placeholder="player" autofocus />
        <button id="name-go">Připojit</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
