<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>superhry · arena</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div class="game-root">
    <canvas id="game-canvas"></canvas>

    <div class="hud">
      <div id="respawn-indicator" class="respawn-indicator" hidden>Respawn in 10s</div>

      <div class="panel-tr minimap-panel">
        <canvas id="minimap" width="240" height="144"></canvas>
      </div>

      <div class="hp-center-panel">
        <div id="buff-w-indicator" class="buff-indicator" hidden>Sprint</div>
        <div class="hp-bar">
          <div id="hp-fill" class="hp-fill"></div>
          <div id="hp-text" class="bar-value">100/100</div>
        </div>
        <div class="mp-bar">
          <div id="mp-fill" class="mp-fill"></div>
          <div id="mp-text" class="bar-value">100/100</div>
        </div>
      </div>

      <div class="ability-bar" id="ability-bar">
        <div class="ability-slot active" id="slot-q">
          <div class="key">Q</div>
          <div class="label">Mystic Shot</div>
          <div class="cd-mask" id="slot-q-mask"></div>
        </div>
        <div class="ability-slot active" id="slot-w">
          <div class="key">W</div>
          <div class="label">Sprint</div>
          <div class="cd-mask" id="slot-w-mask"></div>
        </div>
        <div class="ability-slot active" id="slot-e">
          <div class="key">E</div>
          <div class="label">Teleport</div>
          <div class="cd-mask" id="slot-e-mask"></div>
        </div>
        <div class="ability-slot active" id="slot-r">
          <div class="key">R</div>
          <div class="label">Trueshot</div>
          <div class="cd-mask" id="slot-r-mask"></div>
        </div>
      </div>

      <div class="spellbook-panel" id="spellbook-panel">
        <div class="sb-meta">Upgrade (3g) | Gold: <span id="gold-text">0</span></div>
        <button class="sb-row" data-upgrade="hp"><span>HP</span><span id="u-hp">0/5</span></button>
        <button class="sb-row" data-upgrade="mana"><span>Mana</span><span id="u-mana">0/5</span></button>
        <button class="sb-row" data-upgrade="q"><span>Q Damage</span><span id="u-q">0/5</span></button>
        <button class="sb-row" data-upgrade="w"><span>W Duration</span><span id="u-w">0/5</span></button>
        <button class="sb-row" data-upgrade="e"><span>E Range</span><span id="u-e">0/5</span></button>
        <button class="sb-row" data-upgrade="r"><span>R Power</span><span id="u-r">0/5</span></button>
      </div>
    </div>

    <div id="name-modal" class="name-modal">
      <div class="box">
        <div><b>enter a nickname</b></div>
        <input id="name-input" maxlength="16" placeholder="player" autofocus />
        <button id="name-go">join arena</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
